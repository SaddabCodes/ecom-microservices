spring:
  application:
    name: ecom-application

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ecom_application}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health, info, metrics, loggers, beans, shutdown
    #        include: "*"

  endpoint:
    health:
      show-details: always
    shutdown:
      enabled: true

info:
  app:
    name: ecom-microservices
    version: 0.0.1
    owner: Saddab
