spring:
  application:
    name: ecom-application

  datasource:
    url: jdbc:mysql://localhost:3306/ecom_application
    username: root
    password: 1234

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health, info, metrics
    #        include: "*"

  endpoint:
    health:
      show-details: always

info:
  app:
    name: ecom-microservices
    version: 0.0.1
    owner: Saddab
