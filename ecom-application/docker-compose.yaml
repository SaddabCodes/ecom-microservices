services:
  mysql:
    image: mysql:8.4
    container_name: ecom-mysql
    environment:
      MYSQL_DATABASE: ecom_application
      MYSQL_ROOT_PASSWORD: 1234
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build:
      context: .
    container_name: ecom-application
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ecom_application
      DB_USERNAME: root
      DB_PASSWORD: 1234
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  mysql-data:
