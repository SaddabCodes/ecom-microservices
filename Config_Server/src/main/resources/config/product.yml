spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ms_product_db
    username: root
    password: 1234

  rabbitmq:
    enabled: false


  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

management:
  endpoint:
    busrefresh:
      access: unrestricted
    health:
      show-details: always
    shutdown:
      enabled: true

  endpoints:
    web:
      exposure:
        include: "*"

  health:
    rabbit:
      enabled: false

info:
  app:
    name: Product
    version: 0.0.1
    owner: Saddab

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true

server:
  port: 8081
