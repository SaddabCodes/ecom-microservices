spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://USER
              predicates:
                - Path=/api/users/**

            - id: product-service
              uri: lb://PRODUCT
              predicates:
                - Path=/api/products/**

            - id: order-service
              uri: lb://ORDER
              predicates:
                - Path=/api/orders/**, /api/cart/**

            - id: eureka-server
              uri: http://localhost:8761/
              predicates:
                - Path=/eureka/main
              filters:
                - SetPath=/
            - id: eureka-server-static
              uri: http://localhost:8761
              predicates:
                - Path=/eureka/**


server:
  port: 8080
