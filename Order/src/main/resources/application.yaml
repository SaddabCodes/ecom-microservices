spring:
  application:
    name: Order

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:ms_order_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health, info, metrics, loggers, beans, shutdown

  endpoint:
    health:
      show-details: always
    shutdown:
      enabled: true

info:
  app:
    name: Order
    version: 0.0.1
    owner: Saddab

server:
  port: 8083