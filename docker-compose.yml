# For local development, use the standalone database connections.
# This docker-compose is configured for local databases running on the host machine.
#
# Required local setup:
# - MongoDB on localhost:27017 (database: ms_user_db)
# - MySQL on localhost:3306 (database: ms_product_db, user: root/1234)
# - PostgreSQL on localhost:5433 (database: ms_order_db, user: postgres/1234)
#
# Start services individually with:
#   cd User && ./mvnw spring-boot:run
#   cd Product && ./mvnw spring-boot:run
#   cd Order && ./mvnw spring-boot:run
#
# Or use the legacy Docker setup by checking git history if containerized deployment is needed.

services:
  # User Service - connects to localhost MongoDB
  user-service:
    build:
      context: ./User
      dockerfile: Dockerfile
    container_name: ms_user_service
    ports:
      - "8082:8082"
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: 27017
      DB_DATABASE: ms_user_db
    network_mode: bridge
    restart: unless-stopped

  # Product Service - connects to localhost MySQL
  product-service:
    build:
      context: ./Product
      dockerfile: Dockerfile
    container_name: ms_product_service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_NAME: ms_product_db
      DB_USERNAME: root
      DB_PASSWORD: 1234
    network_mode: bridge
    restart: unless-stopped

  # Order Service - connects to localhost PostgreSQL
  order-service:
    build:
      context: ./Order
      dockerfile: Dockerfile
    container_name: ms_order_service
    ports:
      - "8083:8083"
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: 5433
      DB_NAME: ms_order_db
      DB_USERNAME: postgres
      DB_PASSWORD: 1234
    network_mode: bridge
    restart: unless-stopped
